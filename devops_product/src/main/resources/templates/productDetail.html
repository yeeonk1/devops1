<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>상품 상세</title>
</head>
<body>
<h2>상품 상세</h2>
<form id="frm" method="post">
	<input type="hidden" name="num" th:value="${product.num}">
	상품명: <input type="text" name="name" th:value="${product.name}"><br>
	가격: <input type="text" name="price" th:value="${product.price}"><br>
	수량: <input type="text" name="amount" th:value="${product.amount}"><br>
	
	<button type="submit" th:formaction="@{/product/update}">수정</button>
	<button type="submit" th:formaction="@{/product/delete}">삭제</button>
</form>
<br>
<a th:href="@{/product/list}">목록으로</a>
</body>
</html>
